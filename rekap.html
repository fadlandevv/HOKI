<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoki POS - Rekapan Penjualan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>

    /* ── STAT CARDS ── */
    .card-rekap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 20px;
        box-shadow: var(--sh-sm);
    }

    .stat-val {
        font-family: 'DM Mono', monospace;
        font-size: 22px;
        font-weight: 700;
        color: var(--red);
        margin-top: 4px;
    }

    .stat-val.green {
        color: var(--green);
    }

    .stat-val.dark {
        color: var(--text);
    }

    /* ── SECTION TITLE ── */
    .section-title {
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 8px;
        border: none;
        padding: 0;
    }

    /* ── DETAIL GRID ── */
    .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 16px;
    }

    /* ── CHECKBOX CABANG ── */

    /* ── TABLE OVERRIDES ── */
    #tableMetode,
    #tableMenu,
    #tableDaftarExp {
        width: 100%;
        border-collapse: collapse;
        box-shadow: none;
        border: none;
        border-radius: 0;
        background: transparent;
    }

    #tableMetode th,
    #tableMenu th,
    #tableDaftarExp th {
        background: var(--red);
        color: white;
        padding: 10px 12px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        border: none;
        border-radius: 0;
    }

    #tableMetode td,
    #tableMenu td,
    #tableDaftarExp td {
        padding: 9px 12px;
        border-bottom: 1px solid var(--border);
        border-top: none;
        border-left: none;
        border-right: none;
        color: var(--text);
    }

    /* ── PRINT ── */
    @media print {
        .sidebar,
        .filter-bar,
        button {
            display: none !important;
        }
        .main-content {
            margin: 0 !important;
            padding: 0 !important;
        }
    }

    /* ── RESPONSIVE MOBILE ── */
    @media (max-width: 844px) {

        .detail-grid {
            grid-template-columns: 1fr;
        }

    }

    </style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" onclick="toggleSidebar()">
        <div class="sidebar-logo">
            <img src="Assets/logobrand.png" alt="Hoki">
        </div>
        <div class="sidebar-brand-text">
            <div class="sidebar-brand-name">Hoki Dimsum</div>
            <div class="sidebar-brand-sub">POS System v2.0</div>
        </div>
    </div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">‹</button>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-user">
        <div class="user-card">
            <div class="user-avatar" id="userAvatarInitial">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarUserName">Loading...</div>
                <div class="user-role" id="sidebarUserRole">—</div>
            </div>
            <button class="btn-logout-icon" onclick="logout()" title="Logout">🚪</button>
        </div>
    </div>
</aside>

<!-- ── MAIN CONTENT ── -->
<div class="main-content" id="mainContent">

    <header class="top-header">
        <div class="header-left">
            <div class="header-page-title">📈 Rekapan Penjualan</div>
        </div>
        <div class="header-right">
            <div class="clock-pill">
                <div id="realtimeClock">00:00:00</div>
                <div id="realtimeDate">...</div>
            </div>
        </div>
    </header>

    <div class="page-body">

        <!-- FILTER -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>Pilih Tanggal</label>
                <input type="date" id="filterTgl" onchange="hitungRekapan()">
            </div>
            <div class="filter-group">
                <label>Pilih Cabang (bisa pilih banyak)</label>
                <div id="containerCabang" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px;"></div>
            </div>
        </div>

        <!-- STAT CARDS -->
        <div class="grid-rekap">
            <div class="card-rekap">
                <div class="section-title">💰 Omset (sesuai edit)</div>
                <div class="stat-val" id="totalOmset">Rp 0</div>
            </div>
            <div class="card-rekap">
                <div class="section-title">🥟 Estimasi Dimsum (Pcs)</div>
                <div class="stat-val green" id="totalPcs">0 Pcs</div>
            </div>
            <div class="card-rekap">
                <div class="section-title">💸 Pengeluaran (Audit)</div>
                <div class="stat-val dark" id="totalExp">Rp 0</div>
            </div>
        </div>

        <!-- DETAIL TABLES -->
        <div class="detail-grid">
            <div class="card-rekap">
                <div class="section-title" style="margin-bottom:12px;">💳 Rincian Pembayaran (Settlement)</div>
                <table id="tableMetode">
                    <thead><tr><th>Metode</th><th>Nominal</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="card-rekap">
                <div class="section-title" style="margin-bottom:12px;">🍱 Menu Terjual</div>
                <table id="tableMenu">
                    <thead><tr><th>Nama Menu</th><th>Qty</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="card-rekap">
            <div class="section-title" style="margin-bottom:12px;">📝 Detail Pengeluaran Terlapor</div>
            <table id="tableDaftarExp">
                <thead><tr><th>Nama Barang</th><th>Qty</th><th>Harga</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <button class="bn-item" onclick="location.href='dashboard.html'"><span class="bn-icon">🛒</span><span class="bn-label">Kasir</span></button>
    <button class="bn-item" onclick="location.href='history.html'"><span class="bn-icon">📄</span><span class="bn-label">History</span></button>
    <button class="bn-item" onclick="location.href='stok.html'"><span class="bn-icon">📦</span><span class="bn-label">Stok</span></button>
    <button class="bn-item" onclick="location.href='laporan_staff.html'"><span class="bn-icon">📊</span><span class="bn-label">Laporan</span></button>
    <button class="bn-item active" onclick="openSheet('moreSheet')"><span class="bn-icon">☰</span><span class="bn-label">Lainnya</span></button>
</nav>

<!-- MORE SHEET -->
<div class="sheet-overlay" id="moreSheet" onclick="closeSheetOutside(event,'moreSheet')">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <p style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;">Menu Lainnya</p>
        <div class="more-grid" id="moreGrid"></div>
    </div>
</div>

<script>
const currentUser = JSON.parse(localStorage.getItem('currentUser'));
if (!currentUser) window.location.href = 'index.html';

const role = currentUser.role;

/* ── SIDEBAR ── */
function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const mc = document.getElementById('mainContent');
    sb.classList.toggle('collapsed');
    mc.classList.toggle('expanded');
    localStorage.setItem('sidebarState', sb.classList.contains('collapsed') ? 'small' : 'large');
}

function buildSidebar() {
    if (localStorage.getItem('sidebarState') === 'small') {
        document.getElementById('sidebar').classList.add('collapsed');
        document.getElementById('mainContent').classList.add('expanded');
    }
    const cur = window.location.pathname.split('/').pop() || 'dashboard.html';
    const navItem = (icon, label, link) => {
        const active = cur === link ? 'active' : '';
        return `<button class="nav-item ${active}" onclick="location.href='${link}'">
            <span class="nav-icon">${icon}</span>
            <span class="nav-label">${label}</span>
        </button>`;
    };
    let h = `<div class="nav-group-label">Frontline</div>`;
    h += navItem('🛒','Kasir','dashboard.html');
    h += navItem('📄','History Transaksi','history.html');
    h += navItem('📦','Stok Harian','stok.html');
    h += navItem('🚚','Restock Barang','restock.html');
    h += navItem('📊','Laporan Penjualan','laporan_staff.html');
    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        h += `<div class="nav-group-label">Management</div>`;
        h += navItem('🍱','Master Produk','produk.html');
        h += navItem('📈','Rekapan Penjualan','rekap.html');
    }
    if (['Owner','VIP'].includes(role)) {
        h += `<div class="nav-group-label">Executive</div>`;
        h += navItem('📊','Keuangan Global','laporan.html');
        h += navItem('📈','Statistik','statistik.html');
        h += navItem('💸','Belanja','belanja.html');
    }
    if (role === 'VIP') {
        h += `<div class="nav-group-label">VIP Access</div>`;
        h += navItem('👥','Manajemen User','user.html');
        h += navItem('🔑','History Login','login_history.html');
    }
    document.getElementById('sidebarNav').innerHTML = h;
    const name = currentUser.user || '?';
    document.getElementById('userAvatarInitial').innerText = name.charAt(0).toUpperCase();
    document.getElementById('sidebarUserName').innerText   = name;
    document.getElementById('sidebarUserRole').innerText   = role;
}

/* ── CLOCK ── */
function updateClock() {
    const now = new Date();
    document.getElementById('realtimeClock').innerText = now.toLocaleTimeString('id-ID');
    document.getElementById('realtimeDate').innerText  = now.toLocaleDateString('id-ID',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
}
setInterval(updateClock, 1000);

/* ── MORE MENU ── */
function buildMoreMenu() {
    const items = [{icon:'🚚',label:'Restock',link:'restock.html'}];
    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        items.push({icon:'🍱',label:'Produk',link:'produk.html'});
        items.push({icon:'📈',label:'Rekapan',link:'rekap.html'});
    }
    if (['Owner','VIP'].includes(role)) {
        items.push({icon:'💸',label:'Belanja',link:'belanja.html'});
        items.push({icon:'📊',label:'Keuangan',link:'laporan.html'});
        items.push({icon:'📈',label:'Statistik',link:'statistik.html'});
    }
    if (role === 'VIP') {
        items.push({icon:'👥',label:'Users',link:'user.html'});
        items.push({icon:'🔑',label:'Login Log',link:'login_history.html'});
    }
    items.push({icon:'🚪',label:'Logout',link:'#',action:'logout()'});
    document.getElementById('moreGrid').innerHTML = items.map(i =>
        `<button class="more-btn" onclick="${i.action||`location.href='${i.link}'`}">
            <span class="more-btn-icon">${i.icon}</span>
            <span class="more-btn-label">${i.label}</span>
        </button>`).join('');
}

function openSheet(id) { if(id==='moreSheet') buildMoreMenu(); document.getElementById(id).classList.add('open'); }
function closeSheetOutside(e,id) { if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open'); }

/* ── LOGIKA REKAPAN (TIDAK BERUBAH) ── */
async function loadFilterCabang() {
    try {
        const res        = await fetch('api.php?action=get_branches');
        const dataCabang = await res.json();
        const container  = document.getElementById('containerCabang');
        container.innerHTML = '';

        const jatahCabang = currentUser.cabang || "";
        const daftarAkses = jatahCabang.split(',').map(s => s.trim().toUpperCase());

        dataCabang.forEach(c => {
            const namaCabangSistem = c.nama_cabang.trim().toUpperCase();
            const isBoss           = (role === 'Owner' || role === 'VIP');
            const hasAllAccess     = daftarAkses.includes("SEMUA");
            const isAuthorized     = daftarAkses.includes(namaCabangSistem);

            if (isBoss || hasAllAccess || isAuthorized) {
                container.innerHTML += `
                    <label class="cb-label">
                        <input type="checkbox" class="cb-cabang" value="${c.nama_cabang}" onchange="hitungRekapan()" checked>
                        ${c.nama_cabang}
                    </label>`;
            }
        });

        hitungRekapan();
    } catch (e) { console.error("Gagal sinkron data cabang:", e); }
}

async function hitungRekapan() {
    const tglVal = document.getElementById('filterTgl').value;
    if (!tglVal) return;

    let selectedBranches = Array.from(document.querySelectorAll('.cb-cabang:checked')).map(cb => cb.value);

    if (selectedBranches.length === 0) {
        renderTampilan({ omset: 0, pcs: 0, exp: 0, metode: {}, menu: {}, listExp: [] });
        return;
    }

    try {
        const params = new URLSearchParams({
            action: 'get_laporan_history',
            role:   currentUser.role,
            cabang: currentUser.cabang || ""
        });

        const res        = await fetch(`api.php?${params.toString()}`);
        const allReports = await res.json();

        let total = { omset: 0, pcs: 0, exp: 0, metode: {}, menu: {}, listExp: [] };

        const filtered = allReports.filter(r => {
            const rDate = r.waktu.split(' ')[0];
            return rDate === tglVal && selectedBranches.includes(r.cabang);
        });

        filtered.forEach(r => {
            total.omset += parseInt(r.grand_total || 0);
            const mtd = JSON.parse(r.metode_json || '{}');
            for (let m in mtd) { total.metode[m] = (total.metode[m] || 0) + parseInt(mtd[m]); }
            const audit = JSON.parse(r.audit_json || '{}');
            total.pcs += parseInt(audit.dLak || 0);
            const items = JSON.parse(r.items_json || '[]');
            items.forEach(it => { total.menu[it.nama] = (total.menu[it.nama] || 0) + parseInt(it.qty || 0); });
            const exps = JSON.parse(r.pengeluaran_json || '[]');
            exps.forEach(e => {
                total.exp += parseInt(e.harga || 0);
                total.listExp.push({ ...e, cabang: r.cabang });
            });
        });

        renderTampilan(total);
    } catch (e) {
        console.error("Gagal hitung rekapan:", e);
        toast.error("Terjadi kesalahan saat mengambil data!");
    }
}

function renderTampilan(data) {
    document.getElementById('totalOmset').innerText = `Rp ${data.omset.toLocaleString()}`;
    document.getElementById('totalPcs').innerText   = `${data.pcs.toLocaleString()} Pcs`;
    document.getElementById('totalExp').innerText   = `Rp ${data.exp.toLocaleString()}`;

    const tbodyM = document.querySelector('#tableMetode tbody');
    tbodyM.innerHTML = Object.entries(data.metode).length
        ? Object.entries(data.metode).map(([m, val]) =>
            `<tr><td><b>${m}</b></td><td style="font-family:'DM Mono',monospace;font-weight:700;color:var(--red);">Rp ${val.toLocaleString()}</td></tr>`).join('')
        : '<tr><td colspan="2" style="text-align:center;color:var(--text-muted);padding:20px;">Tidak ada data</td></tr>';

    const tbodyMenu = document.querySelector('#tableMenu tbody');
    tbodyMenu.innerHTML = Object.entries(data.menu).sort((a,b) => b[1]-a[1]).map(([nama, qty]) =>
        `<tr><td>${nama}</td><td style="font-weight:700;">${qty} Porsi</td></tr>`).join('');

    const tbodyExp = document.querySelector('#tableDaftarExp tbody');
    tbodyExp.innerHTML = data.listExp.map(e =>
        `<tr><td>${e.nama} <small style="color:var(--text-muted);">(${e.cabang})</small></td><td>${e.qty || 1}</td><td style="font-family:'DM Mono',monospace;">Rp ${parseInt(e.harga).toLocaleString()}</td></tr>`).join('');
}

async function logout() {
    const ok = await showConfirm('Logout dari sistem?', 'Ya, Logout', 'Batal', '🚪');
    if (ok) {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('cabangHoki');
        window.location.href = 'index.html';
    }
}

window.onload = () => {
    buildSidebar();
    updateClock();
    document.getElementById('filterTgl').value = new Date().toISOString().split('T')[0];
    loadFilterCabang();
};
</script>

<script src="toast.js"></script>
</body>
</html>
