<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoki POS - Warehouse</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥟</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>

    /* ── LAYOUT ── */
    .wh-layout {
        display: flex;
        gap: 12px;
        align-items: flex-start;
    }

    /* ── PRODUCT PANEL (LEFT) ── */
    .wh-product-panel {
        width: 200px;
        flex-shrink: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        box-shadow: var(--sh-sm);
        overflow: hidden;
    }

    .wh-panel-title {
        padding: 10px 14px;
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        border-bottom: 1px solid var(--border);
        background: var(--surface-2);
    }

    .wh-product-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        cursor: pointer;
        border-bottom: 1px solid var(--border);
        transition: background 0.12s;
        border-left: 3px solid transparent;
    }
    .wh-product-item:last-child { border-bottom: none; }
    .wh-product-item:hover { background: var(--surface-2); }
    .wh-product-item.active {
        background: var(--red-soft);
        border-left-color: var(--red);
    }

    .wh-prod-icon {
        font-size: 20px;
        width: 32px;
        text-align: center;
        flex-shrink: 0;
    }

    .wh-prod-info { flex: 1; min-width: 0; }
    .wh-prod-name {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .wh-prod-sku {
        font-family: 'DM Mono', monospace;
        font-size: 10px;
        color: var(--red);
        letter-spacing: 0.5px;
    }

    .wh-sisa-pill {
        font-family: 'DM Mono', monospace;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 99px;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .wh-sisa-pill.ok     { background: #dcfce7; color: #16a34a; }
    .wh-sisa-pill.warn   { background: #fef9c3; color: #ca8a04; }
    .wh-sisa-pill.danger { background: var(--red-soft); color: var(--red); }
    .wh-sisa-pill.none   { background: var(--surface-2); color: var(--text-light); border: 1px solid var(--border); }

    /* ── LEDGER PANEL (RIGHT) ── */
    .wh-ledger-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 0;
    }

    .wh-empty-pick {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 60px 20px;
        text-align: center;
        color: var(--text-light);
    }
    .wh-empty-pick .icon { font-size: 40px; display: block; margin-bottom: 10px; }
    .wh-empty-pick p { font-size: 13px; }

    /* ── LEDGER HEADER CARD ── */
    .wh-ledger-header {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        box-shadow: var(--sh-sm);
        padding: 16px;
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .wh-hdr-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: var(--red);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
    }

    .wh-hdr-name  { font-size: 15px; font-weight: 700; color: var(--text); }
    .wh-hdr-sku   { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--red); }

    .wh-hdr-stok {
        margin-left: auto;
        text-align: right;
        flex-shrink: 0;
    }
    .wh-hdr-stok-val {
        font-family: 'DM Mono', monospace;
        font-size: 22px;
        font-weight: 700;
        line-height: 1;
    }
    .wh-hdr-stok-val.ok     { color: #16a34a; }
    .wh-hdr-stok-val.warn   { color: #ca8a04; }
    .wh-hdr-stok-val.danger { color: var(--red); }
    .wh-hdr-stok-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 2px; }

    /* ── MASUK FORM CARD ── */
    .wh-form-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        box-shadow: var(--sh-sm);
        padding: 14px 16px;
    }

    .wh-card-label {
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 12px;
    }

    .wh-form-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: flex-end;
    }

    .wh-form-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 110px;
    }

    .wh-form-group label {
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .wh-form-group input {
        height: 36px;
        padding: 0 10px;
        border: 1.5px solid var(--border);
        border-radius: var(--r-md);
        font-size: 13px;
        font-family: 'DM Sans', sans-serif;
        background: var(--surface);
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
    }
    .wh-form-group input:focus { border-color: var(--red); }

    /* ── LEDGER TABLE CARD ── */
    .wh-table-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        box-shadow: var(--sh-sm);
        overflow: hidden;
    }

    .wh-table-card-head {
        padding: 10px 16px;
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        border-bottom: 1px solid var(--border);
        background: var(--surface-2);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .wh-table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    .wh-ledger-tbl {
        width: 100%;
        border-collapse: collapse;
        min-width: 480px;
    }

    .wh-ledger-tbl th {
        background: var(--red);
        color: white;
        padding: 10px 14px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        text-align: left;
        white-space: nowrap;
    }

    .wh-ledger-tbl td {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: var(--text);
        vertical-align: middle;
    }

    .wh-ledger-tbl tr:last-child td { border-bottom: none; }
    .wh-ledger-tbl tr.latest td { background: var(--red-soft); }

    .mono { font-family: 'DM Mono', monospace; font-size: 12px; }
    .val-masuk  { color: #16a34a; font-weight: 700; }
    .val-keluar { color: var(--red); font-weight: 700; }
    .val-ok     { color: #16a34a; font-weight: 700; }
    .val-warn   { color: #ca8a04; font-weight: 700; }
    .val-danger { color: var(--red); font-weight: 700; }

    .wh-empty-row td {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-light);
        font-size: 13px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 844px) {
        .wh-layout { flex-direction: column; }
        .wh-product-panel { width: 100%; }
        .wh-form-row { flex-direction: column; }
        .wh-form-group { min-width: unset; width: 100%; }
        .wh-hdr-stok { display: none; }
    }

    </style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" onclick="toggleSidebar()">
        <div class="sidebar-logo">
            <img src="Assets/logobrand.png" alt="Hoki">
        </div>
        <div class="sidebar-brand-text">
            <div class="sidebar-brand-name">Hoki Dimsum</div>
            <div class="sidebar-brand-sub">POS System v2.0</div>
        </div>
    </div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">‹</button>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-user">
        <div class="user-card">
            <div class="user-avatar" id="userAvatarInitial">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarUserName">Loading...</div>
                <div class="user-role" id="sidebarUserRole">—</div>
            </div>
            <button class="btn-logout-icon" onclick="logout()" title="Logout">🚪</button>
        </div>
    </div>
</aside>

<!-- ── MAIN CONTENT ── -->
<div class="main-content" id="mainContent">

    <header class="top-header">
        <div class="header-left">
            <div class="header-page-title">🏭 Warehouse</div>
        </div>
        <div class="header-right">
            <div class="clock-pill">
                <div id="realtimeClock">00:00:00</div>
                <div id="realtimeDate">...</div>
            </div>
        </div>
    </header>

    <div class="page-body">
        <div class="wh-layout">

            <!-- LEFT: Product List -->
            <div class="wh-product-panel">
                <div class="wh-panel-title">📦 Pilih Produk</div>
                <div id="productList">
                    <div style="padding:20px;text-align:center;color:var(--text-light);font-size:12px;">Memuat...</div>
                </div>
            </div>

            <!-- RIGHT: Ledger -->
            <div class="wh-ledger-panel">

                <!-- Empty: belum pilih produk -->
                <div class="wh-empty-pick" id="ledgerEmpty">
                    <span class="icon">📋</span>
                    <p>Pilih produk di sebelah kiri<br>untuk melihat riwayat stok</p>
                </div>

                <!-- Ledger Content -->
                <div id="ledgerContent" style="display:none;">

                    <!-- Header produk -->
                    <div class="wh-ledger-header">
                        <div class="wh-hdr-icon" id="hdrIcon">🥟</div>
                        <div>
                            <div class="wh-hdr-name" id="hdrName">—</div>
                            <div class="wh-hdr-sku" id="hdrSku">—</div>
                        </div>
                        <div class="wh-hdr-stok">
                            <div class="wh-hdr-stok-val" id="hdrSisaVal">—</div>
                            <div class="wh-hdr-stok-lbl">Stok Saat Ini</div>
                        </div>
                    </div>

                    <!-- Form Masuk -->
                    <div class="wh-form-card">
                        <div class="wh-card-label">➕ Tambah Stok Masuk</div>
                        <div class="wh-form-row">
                            <div class="wh-form-group">
                                <label for="masukTgl">Tanggal</label>
                                <input type="date" id="masukTgl">
                            </div>
                            <div class="wh-form-group" style="flex:1;">
                                <label for="masukQty">Jumlah Masuk</label>
                                <input type="number" id="masukQty" min="1" step="1" placeholder="0">
                            </div>
                            <div class="wh-form-group" style="flex:2;">
                                <label for="masukCatatan">Catatan (opsional)</label>
                                <input type="text" id="masukCatatan" placeholder="Cth: Kiriman dari pusat">
                            </div>
                            <button class="btn-simpan" onclick="tambahMasuk()" style="height:36px;align-self:flex-end;white-space:nowrap;">💾 Simpan</button>
                        </div>
                    </div>

                    <!-- Ledger Table -->
                    <div class="wh-table-card">
                        <div class="wh-table-card-head">
                            <span>📋 Riwayat Mutasi Stok</span>
                            <span id="ledgerCountLabel" style="font-size:10px;color:var(--text-light);font-weight:500;text-transform:none;letter-spacing:0;"></span>
                        </div>
                        <div class="wh-table-wrap">
                            <table class="wh-ledger-tbl">
                                <thead>
                                    <tr>
                                        <th>Tanggal</th>
                                        <th>Stok Awal</th>
                                        <th>Masuk</th>
                                        <th>Keluar (Auto)</th>
                                        <th>Sisa Stok</th>
                                    </tr>
                                </thead>
                                <tbody id="ledgerTbody"></tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <button class="bn-item" onclick="location.href='dashboard.html'"><span class="bn-icon">🛒</span><span class="bn-label">Kasir</span></button>
    <button class="bn-item" onclick="location.href='history.html'"><span class="bn-icon">📄</span><span class="bn-label">History</span></button>
    <button class="bn-item" onclick="location.href='stok.html'"><span class="bn-icon">📦</span><span class="bn-label">Stok</span></button>
    <button class="bn-item" onclick="location.href='laporan_staff.html'"><span class="bn-icon">📊</span><span class="bn-label">Laporan</span></button>
    <button class="bn-item active" onclick="openSheet('moreSheet')"><span class="bn-icon">☰</span><span class="bn-label">Lainnya</span></button>
</nav>

<!-- MORE SHEET -->
<div class="sheet-overlay" id="moreSheet" onclick="closeSheetOutside(event,'moreSheet')">
    <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <p style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;">Menu Lainnya</p>
        <div class="more-grid" id="moreGrid"></div>
    </div>
</div>

<script>
const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};
if (!currentUser.user) window.location.href = 'index.html';

/* ── SIDEBAR ── */
function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const mc = document.getElementById('mainContent');
    sb.classList.toggle('collapsed');
    mc.classList.toggle('expanded');
    localStorage.setItem('sidebarState', sb.classList.contains('collapsed') ? 'small' : 'large');
}

function buildSidebar() {
    if (localStorage.getItem('sidebarState') === 'small') {
        document.getElementById('sidebar').classList.add('collapsed');
        document.getElementById('mainContent').classList.add('expanded');
    }
    const role = currentUser.role;
    const cur  = window.location.pathname.split('/').pop() || 'dashboard.html';
    const navItem = (icon, label, link) => {
        const active = cur === link ? 'active' : '';
        return `<button class="nav-item ${active}" onclick="location.href='${link}'">
            <span class="nav-icon">${icon}</span>
            <span class="nav-label">${label}</span>
        </button>`;
    };
    const PAGES_FRONTLINE = ['dashboard.html','history.html','stok.html','restock.html','laporan_staff.html'];
    const PAGES_MGMT      = ['rekap.html','produk.html'];
    const PAGES_EXEC      = ['laporan.html','statistik.html','bahan_baku.html','hpp_produk.html','belanja.html','warehouse.html'];
    const PAGES_VIP       = ['user.html','login_history.html'];
    const inGroup = pages => pages.includes(cur);
    const getOpen = (id) => {
        const s = localStorage.getItem('navGroup_' + id);
        return s !== null ? s === '1' : true;
    };
    const GROUP_ICONS = { frontline:'🛒', management:'📊', executive:'📋', vip:'👑' };
    const navGroup = (id, label, items, pages) => {
        const open      = getOpen(id);
        const hasActive = inGroup(pages);
        const icon      = GROUP_ICONS[id] || '📁';
        return `<div class="nav-group-wrap">
            <button class="nav-group-label${hasActive ? ' has-active' : ''}" onclick="toggleNavGroup('${id}')">
                <span class="nav-group-icon">${icon}</span>
                <span class="nav-group-text">${label}</span>
                <span class="nav-group-ti">${open ? '−' : '+'}</span>
            </button>
            <div class="nav-group-items" id="navg-${id}"${open ? '' : ' style="display:none"'}>
                ${items}
            </div>
        </div>`;
    };

    let frontline = navItem('🛒','Kasir','dashboard.html')
        + navItem('📄','History Transaksi','history.html')
        + navItem('📦','Stok Harian','stok.html')
        + navItem('🚚','Restock Barang','restock.html')
        + navItem('📊','Laporan Penjualan','laporan_staff.html');
    let h = navGroup('frontline', 'Frontline', frontline, PAGES_FRONTLINE);

    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        let mgmt = navItem('📈','Rekapan Penjualan','rekap.html')
            + navItem('🍱','Master Produk','produk.html');
        h += navGroup('management', 'Management', mgmt, PAGES_MGMT);
    }
    if (['Owner','VIP'].includes(role)) {
        let exec = navItem('📊','Keuangan Global','laporan.html')
            + navItem('📈','Statistik','statistik.html')
            + navItem('🧂','Bahan Baku','bahan_baku.html')
            + navItem('💰','HPP Produk','hpp_produk.html')
            + navItem('🏭','Warehouse','warehouse.html')
            + navItem('💸','Belanja','belanja.html');
        h += navGroup('executive', 'Executive', exec, PAGES_EXEC);
    }
    if (role === 'VIP') {
        let vip = navItem('👥','Manajemen User','user.html')
            + navItem('🔑','History Login','login_history.html');
        h += navGroup('vip', 'VIP Access', vip, PAGES_VIP);
    }
    document.getElementById('sidebarNav').innerHTML = h;
    const name = currentUser.fullName || currentUser.user || '?';
    document.getElementById('userAvatarInitial').innerText = name.charAt(0).toUpperCase();
    document.getElementById('sidebarUserName').innerText   = name;
    document.getElementById('sidebarUserRole').innerText   = currentUser.role || '—';
}

function toggleNavGroup(id) {
    const items = document.getElementById('navg-' + id);
    const btn   = items.previousElementSibling;
    const ti    = btn.querySelector('.nav-group-ti');
    const open  = items.style.display !== 'none';
    items.style.display = open ? 'none' : '';
    if (ti) ti.textContent = open ? '+' : '−';
    localStorage.setItem('navGroup_' + id, open ? '0' : '1');
}

/* ── CLOCK ── */
function updateClock() {
    const now = new Date();
    document.getElementById('realtimeClock').innerText = now.toLocaleTimeString('id-ID');
    document.getElementById('realtimeDate').innerText  = now.toLocaleDateString('id-ID',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
}
setInterval(updateClock, 1000);

/* ── MORE MENU ── */
function buildMoreMenu() {
    const role = currentUser.role;
    const items = [{icon:'🚚',label:'Restock',link:'restock.html'}];
    if (['Senior Staff','SPV','Owner','VIP'].includes(role)) {
        items.push({icon:'🍱',label:'Produk',link:'produk.html'});
        items.push({icon:'📈',label:'Rekapan',link:'rekap.html'});
    }
    if (['Owner','VIP'].includes(role)) {
        items.push({icon:'🧂',label:'Bahan Baku',link:'bahan_baku.html'});
        items.push({icon:'💰',label:'HPP Produk',link:'hpp_produk.html'});
        items.push({icon:'🏭',label:'Warehouse',link:'warehouse.html'});
        items.push({icon:'💸',label:'Belanja',link:'belanja.html'});
        items.push({icon:'📊',label:'Keuangan',link:'laporan.html'});
        items.push({icon:'📈',label:'Statistik',link:'statistik.html'});
    }
    if (role === 'VIP') {
        items.push({icon:'👥',label:'Users',link:'user.html'});
        items.push({icon:'🔑',label:'Login Log',link:'login_history.html'});
    }
    items.push({icon:'🚪',label:'Logout',link:'#',action:'logout()'});
    document.getElementById('moreGrid').innerHTML = items.map(i =>
        `<button class="more-btn" onclick="${i.action||`location.href='${i.link}'`}">
            <span class="more-btn-icon">${i.icon}</span>
            <span class="more-btn-label">${i.label}</span>
        </button>`).join('');
}

function openSheet(id) { if(id==='moreSheet') buildMoreMenu(); document.getElementById(id).classList.add('open'); }
function closeSheetOutside(e,id) { if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open'); }

/* ─────────────────────────────────────────────
   WAREHOUSE LOGIC
───────────────────────────────────────────── */

const PRODUCT_ICONS = {
    'DMS':'🥟','SIW':'🍡','HAK':'🫔','CSP':'🦶',
    'NAS':'🍚','DR':'🥤','MIE':'🍜','BAK':'🍢'
};

function getIcon(sku) {
    if (!sku) return '🥟';
    for (const [k,v] of Object.entries(PRODUCT_ICONS)) {
        if (sku.toUpperCase().startsWith(k)) return v;
    }
    return '🥟';
}

function sisaClass(sisa, hasData) {
    if (!hasData) return 'none';
    if (sisa < 0)   return 'danger';
    if (sisa < 10)  return 'warn';
    return 'ok';
}

let selectedSKU  = null;
let selectedProd = null;
let sisaPerSKU   = {};  // { sku: sisa }

/* Load daftar produk + sisa stok masing-masing */
async function loadProdukList() {
    try {
        const [resProd, resTrx, resMasuk] = await Promise.all([
            fetch('api.php?action=get_produk'),
            fetch('api.php?action=get_history'),
            fetch('api.php?action=get_warehouse_ledger&sku=__all__')
        ]);

        const produkList = await resProd.json().catch(() => []);
        const trxList    = await resTrx.json().catch(() => []);

        // Hitung keluar per SKU dari semua transaksi
        const keluarPerSKU = {};
        (Array.isArray(trxList) ? trxList : []).forEach(t => {
            let items = [];
            try { const p = JSON.parse(t.items_json || '[]'); items = Array.isArray(p) ? p : []; } catch(_) {}
            items.forEach(item => {
                const sku = item.sku || '';
                if (sku) keluarPerSKU[sku] = (keluarPerSKU[sku] || 0) + (parseInt(item.qty) || 1);
            });
        });

        // Hitung masuk per SKU (fetch individually per produk — approximation via all ledger)
        // sisaPerSKU akan diupdate saat user klik produk; untuk list tampilkan estimasi
        const masukPerSKU = {};
        // (akan diisi saat loadLedger per SKU)

        const list = document.getElementById('productList');
        const prods = Array.isArray(produkList) ? produkList : [];

        if (prods.length === 0) {
            list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-light);font-size:12px;">Belum ada produk.<br>Tambah di menu Produk.</div>';
            return;
        }

        list.innerHTML = prods.map(p => {
            const icon = getIcon(p.sku);
            return `<div class="wh-product-item" id="prod-item-${p.sku}" onclick="selectProduk(${JSON.stringify(JSON.stringify(p))})">
                <span class="wh-prod-icon">${icon}</span>
                <div class="wh-prod-info">
                    <div class="wh-prod-name">${p.nama}</div>
                    <div class="wh-prod-sku">${p.sku || '—'}</div>
                </div>
                <span class="wh-sisa-pill none" id="pill-${p.sku}">—</span>
            </div>`;
        }).join('');

        // Load sisa untuk setiap produk secara paralel
        prods.forEach(p => { if (p.sku) refreshSisaPill(p.sku); });

    } catch(e) {
        console.error('loadProdukList:', e);
        document.getElementById('productList').innerHTML =
            '<div style="padding:16px;color:var(--red);font-size:12px;">Gagal memuat produk.</div>';
    }
}

async function refreshSisaPill(sku) {
    try {
        const res  = await fetch(`api.php?action=get_warehouse_ledger&sku=${encodeURIComponent(sku)}`);
        const rows = await res.json().catch(() => []);
        const list = Array.isArray(rows) ? rows : [];
        const sisa = list.length > 0 ? list[0].sisa : 0;
        sisaPerSKU[sku] = sisa;

        const pill = document.getElementById(`pill-${sku}`);
        if (!pill) return;
        const cls = list.length === 0 ? 'none' : sisaClass(sisa, true);
        pill.className = `wh-sisa-pill ${cls}`;
        pill.textContent = list.length === 0 ? '—' : sisa;
    } catch(_) {}
}

function selectProduk(jsonStr) {
    const p = JSON.parse(jsonStr);
    selectedSKU  = p.sku;
    selectedProd = p;

    // Update active state
    document.querySelectorAll('.wh-product-item').forEach(el => el.classList.remove('active'));
    const item = document.getElementById(`prod-item-${p.sku}`);
    if (item) item.classList.add('active');

    // Show ledger
    document.getElementById('ledgerEmpty').style.display   = 'none';
    document.getElementById('ledgerContent').style.display = '';

    // Set header
    const icon = getIcon(p.sku);
    document.getElementById('hdrIcon').textContent = icon;
    document.getElementById('hdrName').textContent = p.nama;
    document.getElementById('hdrSku').textContent  = p.sku;

    // Default tanggal masuk = hari ini
    document.getElementById('masukTgl').value = new Date().toISOString().split('T')[0];

    loadLedger(p.sku);
}

async function loadLedger(sku) {
    const tbody = document.getElementById('ledgerTbody');
    tbody.innerHTML = `<tr class="wh-empty-row"><td colspan="5">⏳ Memuat...</td></tr>`;

    try {
        const res  = await fetch(`api.php?action=get_warehouse_ledger&sku=${encodeURIComponent(sku)}`);
        const rows = await res.json().catch(() => []);
        const list = Array.isArray(rows) ? rows : [];

        // Update header stok
        const sisa = list.length > 0 ? list[0].sisa : 0;
        sisaPerSKU[sku] = sisa;
        const cls  = list.length === 0 ? '' : sisaClass(sisa, true);
        const sisaEl = document.getElementById('hdrSisaVal');
        sisaEl.textContent  = list.length === 0 ? '—' : sisa;
        sisaEl.className    = `wh-hdr-stok-val ${cls}`;

        // Update pill in list
        const pill = document.getElementById(`pill-${sku}`);
        if (pill) {
            pill.className   = `wh-sisa-pill ${list.length === 0 ? 'none' : cls}`;
            pill.textContent = list.length === 0 ? '—' : sisa;
        }

        document.getElementById('ledgerCountLabel').textContent =
            list.length > 0 ? `${list.length} entri` : '';

        if (list.length === 0) {
            tbody.innerHTML = `<tr class="wh-empty-row"><td colspan="5">📋 Belum ada riwayat stok.<br>Tambahkan stok masuk pertama di atas.</td></tr>`;
            return;
        }

        tbody.innerHTML = list.map((r, i) => {
            const tgl    = r.tgl || '—';
            const awal   = parseFloat(r.stok_awal || 0);
            const masuk  = parseFloat(r.masuk  || 0);
            const keluar = parseFloat(r.keluar || 0);
            const s      = parseFloat(r.sisa   || 0);
            const sc     = sisaClass(s, true);
            const isLatest = i === 0;

            return `<tr${isLatest ? ' class="latest"' : ''}>
                <td>
                    <span class="mono" style="font-size:12px;">${tgl}</span>
                    ${isLatest ? '<span style="margin-left:6px;font-size:10px;background:var(--red);color:white;padding:1px 6px;border-radius:99px;">Terbaru</span>' : ''}
                </td>
                <td><span class="mono">${awal}</span></td>
                <td><span class="mono ${masuk > 0 ? 'val-masuk' : ''}">${masuk > 0 ? '+' + masuk : '—'}</span></td>
                <td><span class="mono ${keluar > 0 ? 'val-keluar' : ''}">${keluar > 0 ? '-' + keluar : '—'}</span></td>
                <td><span class="mono val-${sc}">${s}</span></td>
            </tr>`;
        }).join('');

    } catch(e) {
        console.error('loadLedger:', e);
        tbody.innerHTML = `<tr class="wh-empty-row"><td colspan="5">⚠️ Gagal memuat data.</td></tr>`;
    }
}

async function tambahMasuk() {
    if (!selectedSKU) return toast.warning('Pilih produk dulu!');

    const tgl     = document.getElementById('masukTgl').value;
    const qty     = parseFloat(document.getElementById('masukQty').value) || 0;
    const catatan = document.getElementById('masukCatatan').value.trim();

    if (!tgl)    return toast.warning('Tanggal wajib diisi!');
    if (qty <= 0) return toast.warning('Jumlah masuk harus lebih dari 0!');

    try {
        const res   = await fetch('api.php?action=save_warehouse_masuk', {
            method:  'POST',
            headers: {'Content-Type':'application/json'},
            body:    JSON.stringify({ sku: selectedSKU, tgl, masuk: qty, catatan })
        });
        const hasil = await res.json();
        if (hasil.status === 'success') {
            toast.success(`Stok masuk +${qty} berhasil disimpan!`);
            document.getElementById('masukQty').value     = '';
            document.getElementById('masukCatatan').value = '';
            loadLedger(selectedSKU);
        } else {
            toast.error('Gagal: ' + (hasil.message || 'error'));
        }
    } catch(e) {
        toast.error('Gagal koneksi server!');
    }
}

async function logout() {
    const ok = await showConfirm('Logout dari sistem?', 'Ya, Logout', 'Batal', '🚪');
    if (ok) {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('cabangHoki');
        window.location.href = 'index.html';
    }
}

window.onload = () => {
    buildSidebar();
    updateClock();
    loadProdukList();
    // Auto-refresh ledger aktif setiap 30 detik
    setInterval(() => { if (selectedSKU) loadLedger(selectedSKU); }, 30000);
};
</script>
