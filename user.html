<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hoki POS - Master Admin & Kepegawaian</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- CSS SIDEBAR KONSISTEN & COLLAPSIBLE (IDENTIK DASHBOARD) --- */
        .sidebar { 
            width: 220px; background: #d32f2f; color: white; padding: 20px 10px; 
            transition: 0.3s; display: flex; flex-direction: column; 
            height: 100vh; position: fixed; left: 0; top: 0; box-sizing: border-box; z-index: 1000;
        }
        .sidebar.collapsed { width: 75px; }
        .sidebar.collapsed .menu-group-label, .sidebar.collapsed li span { display: none; }
        .sidebar.collapsed li { justify-content: center; padding: 15px 0; }
        .sidebar.collapsed .brand { font-size: 14px; }
        .brand { font-weight: 800; letter-spacing: 2px; text-align: center; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
        .menu-group-label { font-size: 11px; color: #ff9999; padding: 15px 15px 5px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; }
        .sidebar ul { list-style: none; padding: 0; margin: 0; flex-grow: 1; overflow-y: auto; overflow-x: hidden; }
        .sidebar ul li { 
            font-size: 13px; padding: 12px 15px; transition: 0.3s; color: white; 
            cursor: pointer; display: flex; align-items: center; border-radius: 8px; margin-bottom: 5px;
        }
        .sidebar ul li:hover { background: rgba(255,255,255,0.1); }
        .sidebar ul li.active { background: #b71c1c; font-weight: bold; }
        .sidebar ul li .icon { min-width: 25px; font-size: 16px; text-align: center; }
        .sidebar ul li span { margin-left: 10px; white-space: nowrap; }
        .logout-section { padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); margin-top: auto; }
        .btn-logout-sidebar { 
            width: 100%; background: #333; color: white; border: none; padding: 10px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center;
        }
        .sidebar.collapsed .btn-logout-sidebar span { display: none; }

        /* Penyesuaian Konten */
        .main-content { margin-left: 220px; padding: 25px; transition: 0.3s; flex: 1; min-height: 100vh; }
        .main-content.expanded { margin-left: 75px; }

        /* --- CSS HALAMAN ADMIN & KEPEGAWAIAN --- */
        .grid-admin { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 20px; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .section-title { color: #d32f2f; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-bottom: 15px; font-size: 16px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: left; }
        th { background: #d32f2f; color: white; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #555; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 13px; }
        
        .checklist-container { border: 1px solid #ddd; border-radius: 8px; max-height: 100px; overflow-y: auto; padding: 5px; background: #fafafa; }
        .check-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; font-size: 11px; }

        .btn-view-doc { background: #1565c0; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .btn-save { background: #d32f2f; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body class="dashboard-body" style="display: flex;">

    <div class="sidebar" id="sidebar">
        <h2 class="brand" onclick="toggleSidebar()">HOKI</h2>
        <nav><ul id="sidebarMenu"></ul></nav>
        <div class="logout-section">
            <button class="btn-logout-sidebar" onclick="logout()">
                <div class="icon">🚪</div> <span>LOGOUT</span>
            </button>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <header>
            <h2 style="margin:0;">Pusat Kendali & Kepegawaian</h2>
            <p style="font-size: 14px; color: #666; margin-bottom: 20px;">Kelola Akun, Cabang, dan Berkas Penting Tim Hoki Dimsum.</p>
        </header>
        <hr>

        <div class="grid-admin">
            <div class="col-side">
                <div class="box" style="margin-bottom: 20px;">
                    <h3 class="section-title">🏢 List Cabang</h3>
                    <input type="text" id="namaCabang" placeholder="Nama cabang baru...">
                    <button onclick="tambahCabang()" style="background:green; color:white; border:none; padding:10px; border-radius:8px; width:100%; margin-top:5px; cursor:pointer; font-weight:bold;">+ Simpan Cabang</button>
                    <table id="tabelCabang">
                        <thead><tr><th>Cabang</th><th>Aksi</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="box">
                    <h3 class="section-title">🛡️ List Role</h3>
                    <input type="text" id="namaRole" placeholder="Role baru...">
                    <button onclick="tambahRole()" style="background:#333; color:white; border:none; padding:10px; border-radius:8px; width:100%; margin-top:5px; cursor:pointer; font-weight:bold;">+ Simpan Role</button>
                    <table id="tabelRole">
                        <thead><tr><th>Role</th><th>Aksi</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="box">
                <h3 class="section-title">📝 Pendaftaran Akun</h3>
                
                <div class="form-group">
                    <label>Nama Lengkap (Sesuai KTP):</label>
                    <input type="text" id="fullName" placeholder="Masukkan nama...">
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Username Login:</label>
                        <input type="text" id="uName" placeholder="user123">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Password Login:</label>
                        <input type="text" id="uPass" placeholder="pass123">
                    </div>
                </div>

                <div class="form-group">
                    <label>Role Jabatan:</label>
                    <select id="uRole"></select>
                </div>

                <div class="form-group">
                    <label>Akses Cabang:</label>
                    <div class="checklist-container" id="containerCeklis"></div>
                </div>

                <div class="form-group" style="background: #fff5f5; padding: 15px; border-radius: 10px; border: 1px dashed #d32f2f;">
                    <label style="color: #d32f2f;">📂 Upload Dokumen (Format Gambar):</label>
                    <label>KTP:</label> <input type="file" id="fileKTP" accept="image/*">
                    <label>KK:</label> <input type="file" id="fileKK" accept="image/*">
                    <label>Surat Kerja:</label> <input type="file" id="fileSPK" accept="image/*">
                </div>

                <button class="btn-save" onclick="tambahUser()">💾 DAFTARKAN SEKARANG</button>
            </div>

            <div class="box">
                <h3 class="section-title">👥 Database Tim</h3>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Nama</th>
                                <th>User</th>
                                <th>Pass</th>
                                <th>Role</th>
                                <th>File</th>
                                <th>X</th>
                            </tr>
                        </thead>
                        <tbody id="tabelUser"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
       const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {user:'Guest', role:'Staff'};

// --- 1. SIDEBAR SINKRON (TETAP SAMA SEPERTI ASLI) ---
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    sidebar.classList.toggle('collapsed');
    mainContent.classList.toggle('expanded');
    localStorage.setItem('sidebarState', sidebar.classList.contains('collapsed') ? 'small' : 'large');
}

        function buildSidebar() {
            const menuContainer = document.getElementById('sidebarMenu');
            const role = currentUser.role;
            const currentPage = window.location.pathname.split("/").pop() || 'dashboard.html';
    
            if (localStorage.getItem('sidebarState') === 'small') {
                document.getElementById('sidebar').classList.add('collapsed');
                document.getElementById('mainContent').classList.add('expanded');
            }
    
            let menuHTML = '';
            const createItem = (icon, label, link, active) => `
                <li class="${active ? 'active' : ''}" onclick="location.href='${link}'">
                    <div class="icon">${icon}</div> <span>${label}</span>
                </li>`;
    
            menuHTML += `<div class="menu-group-label">Frontline Operations</div>`;
            menuHTML += createItem('🛒', 'Kasir', 'dashboard.html', currentPage === 'dashboard.html');
            menuHTML += createItem('📄', 'History Transaksi', 'history.html', currentPage === 'history.html');
            menuHTML += createItem('📦', 'Stok Harian', 'stok.html', currentPage === 'stok.html');
            menuHTML += createItem('🚚', 'Restock Barang', 'restock.html', currentPage === 'restock.html');
            menuHTML += createItem('📊', 'Laporan Penjualan', 'laporan_staff.html', currentPage === 'laporan_staff.html');
    
            if (['Senior Staff', 'SPV', 'Owner', 'VIP'].includes(role)) {
                menuHTML += `<div class="menu-group-label">Tactical Management</div>`;
                menuHTML += createItem('🍱', 'Master Produk', 'produk.html', currentPage === 'produk.html');
                menuHTML += createItem('📈', 'Rekapan Penjualan', 'rekap.html', currentPage === 'rekap.html');
                menuHTML += createItem('💸', 'Belanja', 'belanja.html', currentPage === 'belanja.html');
            }
    
            if (['Owner', 'VIP'].includes(role)) {
                menuHTML += `<div class="menu-group-label">Executive Suite</div>`;
                menuHTML += createItem('📊', 'Keuangan Global', 'laporan.html', currentPage === 'laporan.html');
                menuHTML += createItem('📈', 'Statistik', 'statistik.html', currentPage === 'statistik.html');
            }
    
            if (role === 'VIP') {
                menuHTML += `<div class="menu-group-label" style="color: #ffeb3b; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">👑 VIP Access</div>`;
                menuHTML += createItem('👥', 'Manajemen User', 'user.html', currentPage === 'user.html');
                menuHTML += createItem('🔑', 'History Login', 'login_history.html', currentPage === 'login_history.html');
            }
            menuContainer.innerHTML = menuHTML;
        }

// --- 2. LOGIKA CLOUD DATABASE (MENGGANTIKAN LOCALSTORAGE) ---

// --- MANAJEMEN CABANG ---
async function renderCabang() {
    const res = await fetch('api.php?action=get_cabang');
    const cabang = await res.json();
    const tbody = document.querySelector('#tabelCabang tbody');
    const containerCeklis = document.getElementById('containerCeklis');
    
    tbody.innerHTML = '';
    containerCeklis.innerHTML = `<label class="check-item"><span>Semua</span><input type="checkbox" name="cabangAkses" value="Semua"></label>`;
    
    cabang.forEach((c) => {
        const nama = c.nama_cabang || c; // Handle format lama/baru
        const id = c.id;
        tbody.innerHTML += `<tr><td>${nama}</td><td><button onclick="hapusCabang(${id})" style="color:red; border:none; background:none; cursor:pointer;">x</button></td></tr>`;
        containerCeklis.innerHTML += `<label class="check-item"><span>${nama}</span><input type="checkbox" name="cabangAkses" value="${nama}"></label>`;
    });
}

async function tambahCabang() {
    const nama = document.getElementById('namaCabang').value.trim();
    if(!nama) return alert("Isi nama cabang!");
    await fetch('api.php?action=save_cabang', { method: 'POST', body: JSON.stringify({ nama }) });
    document.getElementById('namaCabang').value = '';
    renderCabang();
}

async function hapusCabang(id) {
    if(confirm("Hapus cabang ini?")) {
        await fetch(`api.php?action=del_cabang&id=${id}`);
        renderCabang();
    }
}

// --- MANAJEMEN ROLE ---
async function renderRole() {
    const res = await fetch('api.php?action=get_roles');
    const roles = await res.json();
    const tbody = document.querySelector('#tabelRole tbody');
    const selectRole = document.getElementById('uRole');
    
    tbody.innerHTML = '';
    selectRole.innerHTML = '';
    
    roles.forEach((r) => {
        tbody.innerHTML += `<tr><td>${r.nama_role}</td><td><button onclick="hapusRole(${r.id},'${r.nama_role}')" style="color:red; border:none; background:none; cursor:pointer;">x</button></td></tr>`;
        selectRole.innerHTML += `<option value="${r.nama_role}">${r.nama_role}</option>`;
    });
}

async function tambahRole() {
    const nama = document.getElementById('namaRole').value.trim();
    if(!nama) return alert("Isi nama role!");
    await fetch('api.php?action=save_role', { method: 'POST', body: JSON.stringify({ nama }) });
    document.getElementById('namaRole').value = '';
    renderRole();
}

async function hapusRole(id, nama) {
    if(nama === 'Owner') return alert("Role Owner tidak bisa dihapus!");
    if(confirm("Hapus role ini?")) {
        await fetch(`api.php?action=del_role&id=${id}`);
        renderRole();
    }
}

// --- MANAJEMEN USER ---
async function tambahUser() {
    const fullName = document.getElementById('fullName').value;
    const u = document.getElementById('uName').value;
    const p = document.getElementById('uPass').value;
    const r = document.getElementById('uRole').value;
    const aks = Array.from(document.querySelectorAll('input[name="cabangAkses"]:checked')).map(c => c.value).join(',');

    if(!u || !p || !fullName) return alert("Lengkapi data!");

    // Konversi file ke Base64 (Tetap pakai fungsi asli Bos)
    const ktp = await readFile(document.getElementById('fileKTP').files[0]);
    const kk = await readFile(document.getElementById('fileKK').files[0]);
    const spk = await readFile(document.getElementById('fileSPK').files[0]);

    const dataUser = {
        fullName, username: u, pass: p, role: r, cabang: aks,
        docs: { ktp, kk, spk }
    };

    const res = await fetch('api.php?action=save_user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dataUser)
    });
    
    const hasil = await res.json();
    if(hasil.status === 'success') {
        alert("Pendaftaran Berhasil ke Cloud!");
        location.reload();
    }
}

async function renderUser() {
    const res = await fetch('api.php?action=get_users');
    const users = await res.json();
    window.allUsersData = users; // Simpan untuk fungsi lihat berkas

    const tbody = document.getElementById('tabelUser');
    tbody.innerHTML = '';
    users.forEach((u, i) => {
        tbody.innerHTML += `
            <tr>
                <td><b>${u.fullName || '-'}</b></td>
                <td>${u.username}</td>
                <td><code>${u.password}</code></td>
                <td>${u.role}</td>
                <td><button class="btn-view-doc" onclick="lihatDokumen(${i})">👁️</button></td>
                <td><button onclick="hapusUser(${u.id})" style="color:red; border:none; background:none; cursor:pointer;">x</button></td>
            </tr>`;
    });
}

function readFile(file) {
    return new Promise((resolve) => {
        if (!file) resolve(null);
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsDataURL(file);
    });
}

function lihatDokumen(idx) {
    const user = window.allUsersData[idx];
    const docs = JSON.parse(user.docs_json || '{}');
    if(!docs.ktp && !docs.kk && !docs.spk) return alert("Tidak ada dokumen.");
    
    let win = window.open("", "_blank");
    win.document.write(`<html><body style="font-family:sans-serif; padding:20px;">
        <h2>Berkas: ${user.fullName}</h2><hr>
        ${docs.ktp ? `<h3>KTP</h3><img src="${docs.ktp}" width="400"><br>` : ''}
        ${docs.kk ? `<h3>KK</h3><img src="${docs.kk}" width="400"><br>` : ''}
        ${docs.spk ? `<h3>SPK</h3><img src="${docs.spk}" width="400">` : ''}
    </body></html>`);
}

async function hapusUser(id) {
    if(confirm("Hapus akun dari cloud?")) {
        await fetch(`api.php?action=del_user&id=${id}`);
        renderUser();
    }
}

function logout() { if(confirm("Logout?")) { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; } }

window.onload = () => { 
    buildSidebar(); 
    renderCabang(); 
    renderRole(); 
    renderUser(); 
};
    </script>
</body>
</html>
