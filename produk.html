<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hoki POS - Master Produk</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- CSS SIDEBAR KONSISTEN & COLLAPSIBLE (IDENTIK DASHBOARD) --- */
        .sidebar { 
            width: 220px; background: #d32f2f; color: white; padding: 20px 10px; 
            transition: 0.3s; display: flex; flex-direction: column; 
            height: 100vh; position: fixed; left: 0; top: 0; box-sizing: border-box; z-index: 1000;
        }
        /* Saat Sidebar Menciut */
        .sidebar.collapsed { width: 75px; }
        .sidebar.collapsed .menu-group-label, .sidebar.collapsed li span { display: none; }
        .sidebar.collapsed li { justify-content: center; padding: 15px 0; }
        .sidebar.collapsed .brand { font-size: 14px; }

        .brand { font-weight: 800; letter-spacing: 2px; text-align: center; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
        
        .menu-group-label { 
            font-size: 11px; color: #ff9999; padding: 15px 15px 5px; 
            text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800;
        }
        
        .sidebar ul { list-style: none; padding: 0; margin: 0; flex-grow: 1; overflow-y: auto; overflow-x: hidden; }
        .sidebar ul li { 
            font-size: 13px; padding: 12px 15px; transition: 0.3s; color: white; 
            cursor: pointer; display: flex; align-items: center; border-radius: 8px; margin-bottom: 5px;
        }
        .sidebar ul li:hover { background: rgba(255,255,255,0.1); }
        .sidebar ul li.active { background: #b71c1c; font-weight: bold; }
        .sidebar ul li .icon { min-width: 25px; font-size: 16px; text-align: center; }
        .sidebar ul li span { margin-left: 10px; white-space: nowrap; }

        /* Logout Section di Dasar Sidebar */
        .logout-section { padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); margin-top: auto; }
        .btn-logout-sidebar { 
            width: 100%; background: #333; color: white; border: none; padding: 10px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center;
        }
        .sidebar.collapsed .btn-logout-sidebar span { display: none; }

        /* Penyesuaian Konten saat Sidebar menciut */
        .main-content { margin-left: 220px; padding: 25px; transition: 0.3s; flex: 1; min-height: 100vh; }
        .main-content.expanded { margin-left: 75px; }

        /* --- CSS HALAMAN PRODUK --- */
        .form-produk { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .grid-input { display: grid; grid-template-columns: 0.8fr 1.5fr 1fr 0.8fr 0.8fr auto; gap: 10px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #d32f2f; color: white; font-size: 13px; }
        .btn-simpan { background: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .badge-qty { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; color: #555; }

        /* DRAG & DROP */
        tr[draggable="true"] { cursor: grab; }
        .dragging { opacity: 0.5; background-color: #fff5f5 !important; border: 2px dashed #d32f2f; }
    </style>
</head>
<body class="dashboard-body" style="display: flex;">

    <div class="sidebar" id="sidebar">
        <h2 class="brand" onclick="toggleSidebar()">HOKI</h2>
        <nav><ul id="sidebarMenu"></ul></nav>
        <div class="logout-section">
            <button class="btn-logout-sidebar" onclick="logout()">
                <div class="icon">🚪</div> <span>LOGOUT</span>
            </button>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <h2>🍱 Manajemen Menu & Produk</h2>
        <p>Atur detail porsi menu Hoki Dimsum. <b>Klik & Tahan baris untuk geser urutan.</b></p>
        <hr>

        <div class="form-produk">
            <div class="grid-input">
                <input type="text" id="pSKU" placeholder="SKU (Cth: MNT)">
                <input type="text" id="pNama" placeholder="Nama Menu">
                <input type="number" id="pHarga" placeholder="Harga Jual">
                <input type="number" id="pDimsum" placeholder="Dimsum (Pcs)">
                <input type="number" id="pAlu" placeholder="Alu Tray (Pcs)">
                <button class="btn-simpan" onclick="tambahProduk()">+ Simpan</button>
            </div>
        </div>

        <table>
           <thead>
    <tr>
        <th style="width: 30px;">#</th> <th>SKU</th>
        <th>Nama Produk</th>
        <th>Harga</th>
        <th>Dms/Pcs</th>
        <th>Alu/Pcs</th>
        <th>Aksi</th>
    </tr>
</thead>
            <tbody id="tabelProduk"></tbody>
        </table>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {user:'Guest', role:'Staff'};

// --- 1. FUNGSI SIDEBAR (TETAP SAMA SEPERTI ASLI) ---
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    sidebar.classList.toggle('collapsed');
    mainContent.classList.toggle('expanded');
    localStorage.setItem('sidebarState', sidebar.classList.contains('collapsed') ? 'small' : 'large');
}

function buildSidebar() {
    const menuContainer = document.getElementById('sidebarMenu');
    const role = currentUser.role;
    const currentPage = window.location.pathname.split("/").pop() || 'dashboard.html';

    if (localStorage.getItem('sidebarState') === 'small') {
        document.getElementById('sidebar').classList.add('collapsed');
        document.getElementById('mainContent').classList.add('expanded');
    }

    let menuHTML = '';
    const createItem = (icon, label, link, active) => `
        <li class="${active ? 'active' : ''}" onclick="location.href='${link}'">
            <div class="icon">${icon}</div> <span>${label}</span>
        </li>`;

    menuHTML += `<div class="menu-group-label">Frontline Operations</div>`;
    menuHTML += createItem('🛒', 'Kasir', 'dashboard.html', currentPage === 'dashboard.html');
    menuHTML += createItem('📄', 'History Transaksi', 'history.html', currentPage === 'history.html');
    menuHTML += createItem('📦', 'Stok Harian', 'stok.html', currentPage === 'stok.html');
    menuHTML += createItem('🚚', 'Restock Barang', 'restock.html', currentPage === 'restock.html');
    menuHTML += createItem('📊', 'Laporan Penjualan', 'laporan_staff.html', currentPage === 'laporan_staff.html');

    if (['Senior Staff', 'SPV', 'Owner', 'VIP'].includes(role)) {
        menuHTML += `<div class="menu-group-label">Tactical Management</div>`;
        menuHTML += createItem('🍱', 'Master Produk', 'produk.html', currentPage === 'produk.html');
        menuHTML += createItem('📈', 'Rekapan Penjualan', 'rekap.html', currentPage === 'rekap.html');
        menuHTML += createItem('💸', 'Belanja', 'belanja.html', currentPage === 'belanja.html');
    }

    if (['Owner', 'VIP'].includes(role)) {
        menuHTML += `<div class="menu-group-label">Executive Suite</div>`;
        menuHTML += createItem('📊', 'Keuangan Global', 'laporan.html', currentPage === 'laporan.html');
        menuHTML += createItem('📈', 'Statistik', 'statistik.html', currentPage === 'statistik.html');
    }

    if (role === 'VIP') {
        menuHTML += `<div class="menu-group-label" style="color: #ffeb3b; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">👑 VIP Access</div>`;
        menuHTML += createItem('👥', 'Manajemen User', 'user.html', currentPage === 'user.html');
        menuHTML += createItem('🔑', 'History Login', 'login_history.html', currentPage === 'login_history.html');
    }
    menuContainer.innerHTML = menuHTML;
}

// --- 2. LOGIKA PRODUK CLOUD (GANTIKAN LOCALSTORAGE) ---

async function muatProduk() {
    const res = await fetch('api.php?action=get_produk');
    const produk = await res.json();
    window.allProduk = produk; // Simpan untuk referensi edit

    const tbody = document.getElementById('tabelProduk');
    tbody.innerHTML = '';

    produk.forEach((p, index) => {
        const tr = document.createElement('tr');
        tr.setAttribute('draggable', 'true');
        tr.setAttribute('data-id', p.id);
        tr.innerHTML = `
            <td style="cursor:move; color:#999;">☰</td>
            <td><b>${p.sku}</b></td>
            <td>${p.nama}</td>
            <td style="color:#d32f2f; font-weight:bold;">Rp ${parseInt(p.harga).toLocaleString()}</td>
            <td>${p.dimsumPcs} Pcs</td>
            <td>${p.aluTrayPcs} Pcs</td>
            <td>
                <button onclick="siapkanEdit(${index})" style="background:#ffa000; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">✎ Edit</button>
                <button onclick="hapusProduk(${p.id})" style="color:red; background:none; border:none; cursor:pointer; margin-left:10px;">✖</button>
            </td>
        `;
        
        // Event Drag & Drop
        tr.addEventListener('dragstart', handleDragStart);
        tr.addEventListener('dragover', handleDragOver);
        tr.addEventListener('drop', handleDrop);
        tbody.appendChild(tr);
    });
}

async function tambahProduk() {
    const sku = document.getElementById('pSKU').value.toUpperCase();
    const nama = document.getElementById('pNama').value;
    const harga = document.getElementById('pHarga').value;
    const dimsum = document.getElementById('pDimsum').value || 0;
    const alu = document.getElementById('pAlu').value || 0;

    if(!sku || !nama || !harga) return alert("Data wajib diisi!");

    const data = {
        sku: sku,
        nama: nama,
        harga: harga,
        dimsumPcs: parseInt(dimsum),
        aluTrayPcs: parseInt(alu)
    };

    try {
        const response = await fetch('api.php?action=save_produk', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const hasil = await response.json();

        if (hasil.status === 'success') {
            alert("Produk Berhasil Disimpan di Cloud! ✅");
            // Reset Form
            document.getElementById('pSKU').value = '';
            document.getElementById('pNama').value = '';
            document.getElementById('pHarga').value = '';
            document.getElementById('pDimsum').value = '';
            document.getElementById('pAlu').value = '';
            muatProduk();
        } else {
            alert("Gagal simpan: " + hasil.message);
        }
    } catch (e) {
        alert("Gagal koneksi ke server pusat!");
    }
}

async function hapusProduk(id) {
    if(confirm("Hapus menu ini secara permanen dari Cloud?")) {
        try {
            await fetch(`api.php?action=del_produk&id=${id}`);
            muatProduk();
        } catch (e) {
            alert("Gagal menghapus produk.");
        }
    }
}

function logout() { 
    if(confirm("Logout?")) { 
        localStorage.removeItem('currentUser'); 
        window.location.href = 'index.html'; 
    } 
}

window.onload = function() {
    buildSidebar();
    muatProduk();
};

    // --- FUNGSI EDIT ---
function siapkanEdit(idx) {
    const p = window.allProduk[idx];
    editModeId = p.id;
    
    document.getElementById('pSKU').value = p.sku;
    document.getElementById('pNama').value = p.nama;
    document.getElementById('pHarga').value = p.harga;
    document.getElementById('pDimsum').value = p.dimsumPcs;
    document.getElementById('pAlu').value = p.aluTrayPcs;

    const btn = document.querySelector('button[onclick="tambahProduk()"]');
    btn.innerText = "💾 UPDATE MENU";
    btn.style.background = "#2e7d32";
    
    // Scroll ke atas biar Bos nggak bingung
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function tambahProduk() {
    const data = {
        id: editModeId, // Jika null berarti tambah baru, jika ada ID berarti update
        sku: document.getElementById('pSKU').value.toUpperCase(),
        nama: document.getElementById('pNama').value,
        harga: document.getElementById('pHarga').value,
        dimsumPcs: document.getElementById('pDimsum').value || 0,
        aluTrayPcs: document.getElementById('pAlu').value || 0
    };

    if(!data.sku || !data.nama || !data.harga) return alert("Lengkapi data!");

    const res = await fetch('api.php?action=save_produk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });

    const hasil = await res.json();
    if(hasil.status === 'success') {
        alert(editModeId ? "Menu berhasil diupdate! ✅" : "Menu baru berhasil ditambah! ✅");
        location.reload(); 
    }
}

// --- FUNGSI DRAG & DROP CLOUD ---
let dragSrcEl = null;

function handleDragStart(e) {
    dragSrcEl = this;
    e.dataTransfer.effectAllowed = 'move';
    this.style.opacity = '0.4';
}

function handleDragOver(e) {
    if (e.preventDefault) e.preventDefault();
    return false;
}

async function handleDrop(e) {
    if (e.stopPropagation) e.stopPropagation();
    
    if (dragSrcEl !== this) {
        // Tukar posisi di layar
        const tbody = document.getElementById('tabelProduk');
        const rows = Array.from(tbody.querySelectorAll('tr'));
        const fromIdx = rows.indexOf(dragSrcEl);
        const toIdx = rows.indexOf(this);

        if (fromIdx < toIdx) {
            this.after(dragSrcEl);
        } else {
            this.before(dragSrcEl);
        }

        // Ambil urutan ID baru
        const newOrderIds = Array.from(tbody.querySelectorAll('tr')).map(tr => tr.getAttribute('data-id'));
        
        // Simpan ke Cloud
        await fetch('api.php?action=update_urutan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids: newOrderIds })
        });
    }
    return false;
}

function handleDragEnd() { this.style.opacity = '1'; }

async function hapusProduk(id) {
    if(confirm("Hapus permanen dari Cloud?")) {
        await fetch(`api.php?action=del_produk&id=${id}`);
        muatProduk();
    }
}

window.onload = () => { buildSidebar(); muatProduk(); };
    </script>
</body>
</html>
